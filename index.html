<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Babe ❤️</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:"Poppins",Arial,sans-serif;
    background:
    linear-gradient(135deg,#ff9a9e,#fad0c4,#ff758c);
}


/* floating hearts */

.heart-float{
    position:absolute;
    bottom:-50px;
    animation:float 8s linear infinite;
    font-size:25px;
}

@keyframes float{

    from{
        transform:translateY(0) rotate(0deg);
        opacity:1;
    }

    to{
        transform:translateY(-120vh) rotate(360deg);
        opacity:0;
    }

}


/* card */

.card{

    width:90%;
    max-width:420px;

    background:rgba(255,255,255,0.92);

    backdrop-filter:blur(10px);

    padding:20px 25px;

    border-radius:30px;

    text-align:center;

    box-shadow:
    0 20px 50px rgba(0,0,0,.25);

    animation:open 1.5s ease;

}


@keyframes open{

from{
transform:scale(.3);
opacity:0;
}

to{
transform:scale(1);
opacity:1;
}

}



/* photo */


.photo{

width:190px;
height:190px;

object-fit:cover;

border-radius:50%;

border:7px solid #ff4d6d;

animation:pulse 2s infinite;

}


@keyframes pulse{

50%{
transform:scale(1.05);
}

}



h1{

font-size:32px;

color:#ff3366;

margin:20px 0 10px;

}



.message{

font-size:22px;

line-height:2;

color:#555;

min-height:150px;

}



button{

margin-top:20px;

padding:15px 35px;

border:none;

border-radius:50px;

background:#ff3366;

color:white;

font-size:18px;

cursor:pointer;

box-shadow:0 10px 20px rgba(255,51,102,.4);

transition:.3s;

}


button:hover{

transform:scale(1.1);

}



.music{

margin-top:15px;

font-size:14px;

color:#888;

}



/* mobile */


@media(max-width:500px){


.card{

padding:25px 18px;

}


.photo{

width:150px;
height:150px;

}

.message {
    transition: opacity 0.5s ease;
}


h1{

font-size:24px;

}


.message{

font-size:15px;

}

}


</style>

</head>


<body>


<audio id="music" loop>

<source src="./music.mp3" type="audio/mpeg">

</audio>



<div class="card">


<div style="font-size:50px">
❤️
</div>


<img src="./photo_1.jpg" class="photo">



<h1>
Happy Birthday Asni 🎂
</h1>



<div class="message" id="typing"></div>

<h3>መልካም ልደት የኔ ቆንጆ🎉🎂"</h3>

<button onclick="startSurprise()">

Open Your Surprise 💕

</button>




<div class="music">

🎵 Tap the button to start the birthday song

</div>


</div>



<script>

    const sentences = [
        "Dear Babe❤️",
    
        "Today is not just another day.",
    
        "It is the day a wonderful person came into this world. 🌎",
    
        "I wish you endless happiness, success, love and beautiful memories.",
    
        "Thank you for being an amazing friend.",
    
        "May your smile always shine brighter. ❤️",
    
        "Happy Birthday 🎉🎂",
        
    ];
    
    
    let sentenceIndex = 0;
    
    
    function showSentence(){
    
    
        const message = document.getElementById("typing");
    
    
        message.style.opacity = 0;
    
    
        setTimeout(()=>{
    
    
            message.innerHTML = sentences[sentenceIndex];
    
    
            message.style.opacity = 1;
    
    
            sentenceIndex++;
    
    
            if(sentenceIndex >= sentences.length){
    
                sentenceIndex = 0;
    
            }
    
    
        },500);
    
    
    
    }
    
    
    
    // start loop
    
    function startMessageLoop(){
    
        showSentence();
    
    
        setInterval(showSentence,4000);
    
    }
    
    
    
    function startSurprise(){
    
    
        let music=document.getElementById("music");
    
    
        music.play();
    
    
        document.querySelector("button").style.display="none";
    
    
        startMessageLoop();
    
    
        createHearts();
    
    
    }
    
    
    
    function createHearts(){
    
    
        for(let i=0;i<40;i++){
    
    
            let heart=document.createElement("div");
    
    
            heart.className="heart-float";
    
    
            heart.innerHTML="❤️";
    
    
            heart.style.left=Math.random()*100+"%";
    
    
            heart.style.animationDuration=
            (4+Math.random()*5)+"s";
    
    
            heart.style.fontSize=
            (15+Math.random()*30)+"px";
    
    
            document.body.appendChild(heart);
    
    
        }
    
    
    }
    
    </script>

</body>

</html>
