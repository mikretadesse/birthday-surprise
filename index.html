<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Happy Birthday Babe ❤️</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ff758c, #ff7eb3);
        font-family: "Arial", sans-serif;
        overflow: hidden;
      }

      .card {
        width: 90%;
        max-width: 400px;
        background: white;
        padding: 25px;
        border-radius: 25px;
        text-align: center;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
        animation: show 1.5s ease;
      }

      @keyframes show {
        from {
          transform: scale(0);
        }
        to {
          transform: scale(1);
        }
      }

      .photo {
        width: 180px;
        height: 180px;
        border-radius: 50%;
        object-fit: cover;
        border: 6px solid #ff4d6d;
      }

      h1 {
        color: #ff4d6d;
        font-size: 32px;
      }

      .message {
        min-height: 100px;
        color: #555;
        font-size: 17px;
        line-height: 1.6;
      }

      .heart {
        font-size: 45px;
        animation: beat 1s infinite;
      }

      @keyframes beat {
        50% {
          transform: scale(1.3);
        }
      }

      button {
        background: #ff4d6d;
        color: white;
        border: none;
        padding: 14px 25px;
        border-radius: 30px;
        font-size: 16px;
        margin-top: 15px;
      }

      @media (max-width: 500px) {
        .card {
          padding: 20px;
        }

        .photo {
          width: 150px;
          height: 150px;
        }

        h1 {
          font-size: 27px;
        }

        .message {
          font-size: 15px;
        }
      }
    </style>
  </head>

  <body>
    <audio id="music" loop>
      <source src="./music.mp3" type="audio/mpeg" />
    </audio>

    <div class="card">
      <div class="heart">❤️</div>

      <img src="./photo_1.jpg" class="photo" />

      <h1>Happy Birthday Babe 🎂</h1>

      <div class="message" id="typing"></div>

      <button onclick="startSurprise()">Open Surprise 💕</button>
    </div>

    <script>
      const text =
        "Today is a special day because someone amazing was born ❤️\n\n" +
        "I wish you happiness, success, love, and endless beautiful moments.\n\n" +
        "Thank you for being such a wonderful friend. Happy Birthday Babe 🎉";

      let index = 0;

      function typing() {
        if (index < text.length) {
          document.getElementById("typing").innerHTML +=
            text[index] === "\n" ? "<br>" : text[index];

          index++;

          setTimeout(typing, 50);
        }
      }

      function startSurprise() {
        document.getElementById("music").play();

        document.querySelector("button").style.display = "none";

        typing();
      }
    </script>
  </body>
</html>
